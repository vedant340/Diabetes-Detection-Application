<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MediAI — {% block title %}Dashboard{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,300&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<style>
/* ════ MOBILE OVERLAY & HAMBURGER ════ */
.sidebar-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);
  z-index:99;backdrop-filter:blur(2px);
}
.sidebar-overlay.show{display:block;}

.hamburger{
  display:none;position:fixed;top:1rem;left:1rem;z-index:200;
  width:40px;height:40px;border-radius:10px;
  background:var(--surface);border:1px solid var(--border);
  box-shadow:var(--shadow-md);cursor:pointer;
  align-items:center;justify-content:center;flex-direction:column;gap:5px;
  padding:10px;transition:var(--transition);
}
.hamburger span{
  display:block;width:18px;height:2px;
  background:var(--text);border-radius:2px;
  transition:all .25s;
}
.hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
.hamburger.open span:nth-child(2){opacity:0;transform:translateX(-8px);}
.hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}

/* ════ RESPONSIVE BREAKPOINTS ════ */

/* Tablet — 768-1024px */
@media(max-width:1024px){
  :root{--sidebar-w:220px;}
  .main{padding:1.5rem 1.6rem;}
  .grid-4{grid-template-columns:repeat(2,1fr);}
  .page-title{font-size:1.5rem;}
}

/* Mobile — up to 768px */
@media(max-width:768px){
  :root{--sidebar-w:260px;}

  .hamburger{display:flex;}

  /* Sidebar slides in from left */
  .sidebar{
    transform:translateX(-100%);
    transition:transform .28s cubic-bezier(.4,0,.2,1);
    z-index:150;
    box-shadow:4px 0 20px rgba(0,0,0,.15);
  }
  .sidebar.open{transform:translateX(0);}

  .main{
    margin-left:0 !important;
    padding:4.5rem 1rem 1.2rem;
  }

  .grid-4,.grid-3{grid-template-columns:repeat(2,1fr);}
  .grid-2{grid-template-columns:1fr;}

  .page-title{font-size:1.35rem;}
  .page-sub{font-size:.82rem;}
  .card{padding:1.1rem 1.2rem;}
  .card-value{font-size:1.6rem;}
}

/* Small mobile — up to 480px */
@media(max-width:480px){
  .main{padding:4.2rem .75rem 1rem;}
  .grid-4,.grid-3{grid-template-columns:1fr;}
  .page-title{font-size:1.2rem;}
  .card{padding:.9rem 1rem;}
  table{font-size:.76rem;}
  canvas{max-height:200px !important;}
}

/* Chart max height on mobile */
@media(max-width:768px){
  canvas{max-height:220px;}
}
</style>
</head>
<body>

<!-- Hamburger button (mobile only) -->
<button class="hamburger" id="hamburger" aria-label="Toggle menu">
  <span></span><span></span><span></span>
</button>

<!-- Overlay -->
<div class="sidebar-overlay" id="overlay"></div>

<!-- ═══ SIDEBAR ═══ -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="sidebar-logo-icon">🩺</div>
    <div>
      <div class="sidebar-logo-name">MediAI</div>
      <div class="sidebar-logo-sub">Diabetes Detection</div>
    </div>
  </div>

  <div class="sidebar-user">
    <div class="sidebar-avatar">👤</div>
    <div>
      <div class="sidebar-uname">{{ username }}</div>
      <div class="sidebar-role">Clinical User</div>
    </div>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-section">Main</div>
    <a href="/dashboard" class="nav-link {% if request.endpoint=='dashboard' %}active{% endif %}" onclick="closeSidebar()">
      <span class="nav-icon">🏠</span><span class="nav-label">Dashboard</span>
    </a>
    <a href="/analysis" class="nav-link {% if request.endpoint=='analysis' %}active{% endif %}" onclick="closeSidebar()">
      <span class="nav-icon">🔬</span><span class="nav-label">AI Analysis</span>
      <span class="nav-badge">AI</span>
    </a>

    <div class="nav-section">Explore</div>
    <a href="/map" class="nav-link {% if request.endpoint=='world_map' %}active{% endif %}" onclick="closeSidebar()">
      <span class="nav-icon">🌍</span><span class="nav-label">Global Map</span>
    </a>
    <a href="/visualization" class="nav-link {% if request.endpoint=='visualization' %}active{% endif %}" onclick="closeSidebar()">
      <span class="nav-icon">📊</span><span class="nav-label">Data Visualization</span>
    </a>
    <a href="/info" class="nav-link {% if request.endpoint=='info' %}active{% endif %}" onclick="closeSidebar()">
      <span class="nav-icon">📚</span><span class="nav-label">Information</span>
    </a>

    <div class="nav-section">Account</div>
    <a href="/history" class="nav-link {% if request.endpoint=='history' %}active{% endif %}" onclick="closeSidebar()">
      <span class="nav-icon">📜</span><span class="nav-label">History</span>
    </a>
  </nav>

  <div class="sidebar-footer">
    <div class="sidebar-stat">
      <div class="sidebar-stat-val">79.15%</div>
      <div class="sidebar-stat-lbl">SVM · CV Accuracy</div>
    </div>
    <a href="/logout" class="logout-btn">🚪 Sign Out</a>
  </div>
</aside>

<!-- ═══ MAIN ═══ -->
<main class="main">
  {% block content %}{% endblock %}
</main>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
<script>
/* ── Sidebar toggle ── */
const sidebar   = document.getElementById('sidebar');
const hamburger = document.getElementById('hamburger');
const overlay   = document.getElementById('overlay');

hamburger.addEventListener('click', ()=>{
  const open = sidebar.classList.toggle('open');
  hamburger.classList.toggle('open', open);
  overlay.classList.toggle('show', open);
  document.body.style.overflow = open ? 'hidden' : '';
});

overlay.addEventListener('click', closeSidebar);
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeSidebar(); });

function closeSidebar(){
  sidebar.classList.remove('open');
  hamburger.classList.remove('open');
  overlay.classList.remove('show');
  document.body.style.overflow = '';
}

/* ── Chart.js global defaults ── */
if(typeof Chart !== 'undefined'){
  Chart.defaults.font.family  = "'DM Sans', sans-serif";
  Chart.defaults.font.size    = 11;
  Chart.defaults.color        = '#8FA0B4';
  Chart.defaults.plugins.tooltip.backgroundColor = '#1A2332';
  Chart.defaults.plugins.tooltip.titleColor      = '#E2E8F0';
  Chart.defaults.plugins.tooltip.bodyColor       = '#94A3B8';
  Chart.defaults.plugins.tooltip.cornerRadius    = 10;
  Chart.defaults.plugins.tooltip.padding         = 10;
  Chart.defaults.animation.duration              = 600;
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
